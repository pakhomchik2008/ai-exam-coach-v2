<script>
  // No daily cap: this is a local prototype on a paid API key, not a shipped
  // free tier yet. A shared cross-feature quota here was silently masquerading
  // as real AI output once exhausted (see onboarding plan-summary bug).
  window.claude = {
    complete: async (arg) => {
      const system = typeof arg === 'string' ? undefined : arg.system;
      const messages = typeof arg === 'string' ? [{ role: 'user', content: arg }] : arg.messages;
      const res = await fetch('/api/complete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ system, messages }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error ? JSON.stringify(data.error) : 'proxy error');
      return data.text;
    },
  };
</script>

<script type="text/babel">
// ─── Tweak definitions ────────────────────────────────────────────────────────

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "Indigo",
  "density": "Comfortable",
  "depth": "Flat"
}/*EDITMODE-END*/;

// Accent palettes — each swaps the entire indigo/accent token set
const ACCENT_PALETTES = {
  Indigo: {
    "--indigo-50":  "#EEF2FF",
    "--indigo-100": "#E0E7FF",
    "--indigo-500": "#6366F1",
    "--indigo-600": "#4F46E5",
    "--indigo-700": "#4338CA",
    "--action-accent":       "#4F46E5",
    "--action-accent-hover": "#4338CA",
  },
  Violet: {
    "--indigo-50":  "#F5F3FF",
    "--indigo-100": "#EDE9FE",
    "--indigo-500": "#8B5CF6",
    "--indigo-600": "#7C3AED",
    "--indigo-700": "#6D28D9",
    "--action-accent":       "#7C3AED",
    "--action-accent-hover": "#6D28D9",
  },
  Rose: {
    "--indigo-50":  "#FFF1F2",
    "--indigo-100": "#FFE4E6",
    "--indigo-500": "#F43F5E",
    "--indigo-600": "#E11D48",
    "--indigo-700": "#BE123C",
    "--action-accent":       "#E11D48",
    "--action-accent-hover": "#BE123C",
  },
  Amber: {
    "--indigo-50":  "#FFFBEB",
    "--indigo-100": "#FEF3C7",
    "--indigo-500": "#F59E0B",
    "--indigo-600": "#D97706",
    "--indigo-700": "#B45309",
    "--action-accent":       "#D97706",
    "--action-accent-hover": "#B45309",
  },
};

// Density — rescales spacing multiplier + base text size
const DENSITY_VARS = {
  Compact: {
    "--space-2": "0.35rem",
    "--space-3": "0.6rem",
    "--space-4": "0.75rem",
    "--space-5": "0.9rem",
    "--space-6": "1.1rem",
    "--space-8": "1.5rem",
    "--text-sm":   "0.8rem",
    "--text-base": "0.9rem",
    "--text-lg":   "1rem",
    "--text-xl":   "1.1rem",
    "--text-2xl":  "1.3rem",
  },
  Comfortable: {},  // token defaults — no overrides needed
  Spacious: {
    "--space-2": "0.65rem",
    "--space-3": "1rem",
    "--space-4": "1.35rem",
    "--space-5": "1.6rem",
    "--space-6": "2rem",
    "--space-8": "2.75rem",
    "--text-sm":   "0.95rem",
    "--text-base": "1.1rem",
    "--text-lg":   "1.25rem",
    "--text-xl":   "1.4rem",
    "--text-2xl":  "1.75rem",
  },
};

// Depth — shifts shadow + border intensity
const DEPTH_VARS = {
  Flat: {
    "--shadow-sm": "none",
    "--shadow-md": "none",
    "--shadow-lg": "none",
    "--border-default": "var(--slate-200)",
    "--border-subtle":  "var(--slate-200)",
  },
  Default: {},  // token defaults
  Floating: {
    "--shadow-sm": "0 4px 18px -2px rgba(15,23,42,0.11), 0 2px 6px -2px rgba(15,23,42,0.07)",
    "--shadow-md": "0 10px 36px -4px rgba(15,23,42,0.14), 0 4px 12px -4px rgba(15,23,42,0.08)",
    "--shadow-lg": "0 20px 56px -6px rgba(15,23,42,0.18), 0 8px 20px -6px rgba(15,23,42,0.10)",
    "--border-default": "transparent",
    "--border-subtle":  "transparent",
  },
};

// Inject all active tweaks as CSS custom properties on :root
function applyTweaks(accent, density, depth) {
  const vars = {
    ...ACCENT_PALETTES[accent]  || {},
    ...DENSITY_VARS[density]    || {},
    ...DEPTH_VARS[depth]        || {},
  };
  let style = document.getElementById("__tweak-overrides");
  if (!style) {
    style = document.createElement("style");
    style.id = "__tweak-overrides";
    document.head.appendChild(style);
  }
  const rules = Object.entries(vars).map(([k, v]) => `  ${k}: ${v} !important;`).join("\n");
  style.textContent = `:root {\n${rules}\n}`;
}

// ─── App ──────────────────────────────────────────────────────────────────────

function App() {
  const [tw, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [route, setRoute] = React.useState(() => (window.getSession && window.getSession() ? "app" : "landing"));
  const [tab,   setTab]   = React.useState("dashboard");
  const [lang,  setLang]  = React.useState("en");
  const [chatQuery, setChatQuery] = React.useState(null);
  const [planExamIds, setPlanExamIds] = React.useState(null);
  // Bumped whenever another tab/window writes to one of this app's
  // localStorage keys (exams, schedule, profile, auth session, mistakes).
  // localStorage itself is already shared across tabs in the same origin —
  // the gap was that a mounted screen here never knew to re-read it. Keying
  // `content` on this forces the current screen to remount and re-fetch
  // fresh data instead of silently showing what was true when it first
  // mounted in *this* tab.
  const [dataVersion, setDataVersion] = React.useState(0);

  // Re-apply CSS overrides whenever a tweak changes
  React.useEffect(() => {
    applyTweaks(tw.accent, tw.density, tw.depth);
  }, [tw.accent, tw.density, tw.depth]);

  React.useEffect(() => {
    const SYNCED_KEYS = [window.EXAMS_KEY, window.SCHEDULE_KEY, window.PROFILE_KEY, window.ACCOUNTS_KEY, window.SESSION_KEY, window.MISTAKES_KEY];
    const onStorage = (e) => {
      if (e.key && !SYNCED_KEYS.includes(e.key)) return;
      if (e.key === window.SESSION_KEY) {
        // A logout (or login) in another tab should be reflected here too,
        // not just the data underneath an already-rendered screen.
        setRoute(window.getSession && window.getSession() ? "app" : "landing");
      }
      setDataVersion((v) => v + 1);
    };
    window.addEventListener("storage", onStorage);
    return () => window.removeEventListener("storage", onStorage);
  }, []);

  const t = (window.LANGS || {})[lang] || (window.LANGS || {}).en || {};

  const goApp = () => { setRoute("app"); setTab("dashboard"); };
  const goPlanning = (newExams) => { setPlanExamIds(newExams ? newExams.map(e => e.id) : null); setRoute("planning"); };
  const goToChat = (query) => { setTab("chat"); setChatQuery(query || null); };
  // After Sign Up / Log In / Try Demo: a returning account with existing data
  // (or a demo session that already ran onboarding once) skips straight to
  // the dashboard; anyone with no profile yet goes through onboarding once.
  const goAfterAuth = () => { setRoute(window.hasProfile && window.hasProfile() ? "app" : "onboarding"); setTab("dashboard"); };

  if (route === "landing")
    return <window.Landing onContinue={goAfterAuth} />;
  if (route === "onboarding")
    return <window.Onboarding onFinish={(newExams) => goPlanning(newExams)} lang={lang} onLangChange={setLang} />;
  if (route === "planning")
    return <window.AIPlan examIds={planExamIds} onStart={goApp} t={t} />;

  // key={dataVersion} forces a clean remount (and re-fetch from
  // localStorage) whenever another tab changes the underlying data — without
  // it, a screen mounted before that change would keep showing whatever it
  // read on its own first mount.
  const content =
      tab === "chat"     ? <window.AIChat t={t} initialQuery={chatQuery} onConsumeQuery={() => setChatQuery(null)} />
    : tab === "study"    ? <window.StudyHub t={t} />
    : tab === "journal"  ? <window.MistakeJournal t={t} />
    : tab === "schedule" ? <window.Schedule t={t} />
    : tab === "exams"    ? <window.Exams t={t} onPlanReady={(newExams) => goPlanning(newExams)} />
    : tab === "progress" ? <window.Progress t={t} />
    : tab === "settings" ? <window.Settings t={t} lang={lang} onLangChange={setLang} onLogout={() => setRoute("landing")} />
    : <window.Dashboard onOpenCourse={() => {}} onGoToChat={goToChat} onGoToExams={() => setTab("exams")} onGoToSchedule={() => setTab("schedule")} t={t} />;

  return (
    <div>
      <window.AppNav
        current={tab}
        onNavigate={(id) => setTab(id)}
        onLogout={() => setRoute("landing")}
        lang={lang}
        onLangChange={setLang}
      />
      <main style={{ maxWidth: "var(--container-app)", margin: "0 auto", padding: "var(--space-8) var(--space-4)" }}>
        {content}
      </main>

      <TweaksPanel>
        <TweakSection label="Accent colour" />
        <TweakRadio
          label="Palette"
          value={tw.accent}
          options={["Indigo", "Violet", "Rose", "Amber"]}
          onChange={(v) => setTweak("accent", v)}
        />

        <TweakSection label="Density" />
        <TweakRadio
          label="Spacing"
          value={tw.density}
          options={["Compact", "Comfortable", "Spacious"]}
          onChange={(v) => setTweak("density", v)}
        />

        <TweakSection label="Card depth" />
        <TweakRadio
          label="Elevation"
          value={tw.depth}
          options={["Flat", "Default", "Floating"]}
          onChange={(v) => setTweak("depth", v)}
        />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
